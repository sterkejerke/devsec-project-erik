<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevSecOps Demo App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 640px;
      width: 100%;
    }

    .status-badge {
      display: inline-block;
      padding: 0.3rem 0.9rem;
      border-radius: 9999px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      margin-bottom: 1.5rem;
      background: #166534;
      color: #bbf7d0;
      border: 1px solid #15803d;
      transition: background 0.3s;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 1.1rem 1.25rem;
      text-align: left;
    }

    .card .label {
      font-size: 0.7rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
    }

    .card .value {
      font-size: 1.05rem;
      font-weight: 600;
      color: #f1f5f9;
      word-break: break-all;
    }

    .pipeline {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      flex-wrap: wrap;
    }

    .step {
      background: #1e293b;
      border: 1px solid #4f46e5;
      border-radius: 0.4rem;
      padding: 0.4rem 0.85rem;
      font-size: 0.78rem;
      font-weight: 600;
      color: #a5b4fc;
    }

    .arrow {
      color: #334155;
      font-size: 1rem;
      padding: 0 0.3rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-badge" id="badge">● Connecting…</div>

    <h1>DevSecOps Demo</h1>
    <p class="subtitle">Automatically built &amp; deployed via Forgejo Actions</p>

    <div class="grid">
      <div class="card">
        <div class="label">Version</div>
        <div class="value" id="version">—</div>
      </div>
      <div class="card">
        <div class="label">Status</div>
        <div class="value" id="status">—</div>
      </div>
      <div class="card">
        <div class="label">Deployed At</div>
        <div class="value" id="deployed">—</div>
      </div>
      <div class="card">
        <div class="label">Uptime</div>
        <div class="value" id="uptime">—</div>
      </div>
    </div>

    <div class="pipeline">
      <div class="step">SAST</div>
      <div class="arrow">›</div>
      <div class="step">Build</div>
      <div class="arrow">›</div>
      <div class="step">SBOM</div>
      <div class="arrow">›</div>
      <div class="step">Scan</div>
      <div class="arrow">›</div>
      <div class="step">Deploy</div>
    </div>
  </div>

  <script>
    async function refresh() {
      try {
        const data = await fetch('/api/info').then(r => r.json());
        document.getElementById('version').textContent  = 'v' + data.version;
        document.getElementById('status').textContent   = data.status;
        document.getElementById('deployed').textContent = new Date(data.deployedAt).toLocaleString();
        document.getElementById('uptime').textContent   = data.uptime + 's';
        const badge = document.getElementById('badge');
        badge.textContent = '● Running';
        badge.style.background = '#166534';
        badge.style.color = '#bbf7d0';
      } catch (_) {
        const badge = document.getElementById('badge');
        badge.textContent = '● Unreachable';
        badge.style.background = '#7f1d1d';
        badge.style.color = '#fecaca';
      }
    }
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
